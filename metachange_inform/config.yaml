database:
  host: localhost
  port: 3306
  database: metachange
  username: change_me
  password: change_me
  charset: utf8mb4
  pool_size: 5
  connection_timeout: 30
  read_timeout: 30
llm:
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model_name: qwen-turbo
  api_key: change_me
  timeout: 120
  max_tokens: 4000
  temperature: 0.7
  batch_size: 4
scan:
  schedule: 0 23 * * *
  lookback_hours: 0
  similarity_threshold: 0.85
  enable_cache: true
  cache_ttl_hours: 168
  max_tokens_per_request: 25000
  max_changed_per_batch: 5
  candidate_similarity_threshold: 0.4
  max_candidates_per_change: 50
output:
  format: markdown
  report_dir: ./reports
  log_dir: ./logs
  cache_dir: ./cache
  filename_prefix: metadata_redundancy
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: ./logs/metachange_inform.log
  max_file_size: 10485760
  backup_count: 5
metadata_fields:
  primary_key: METADATA_ID
  name_fields:
  - METADATA_NAME
  - CHINESE_NAME
  - METADATA_ALIAS
  semantic_fields:
  - BUSS_DEFINE
  - BUSS_RULE
  - REMARK
  - DATA_SOURCE
  context_fields:
  - CATEGORY_WORD_ID
  - TYPE
  - LENGTH
  - STATUS
  time_fields:
  - OPT_TIME
  - AUDIT_DATE
  user_fields:
  - OPT_USER
  - AUDIT_USER
table_names:
  current: metadata
  audit: metadata_audit
  history: metadata_his
