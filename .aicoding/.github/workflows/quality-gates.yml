name: Quality Gates

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure dependencies
        shell: bash
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y jq
          }

      - name: Run script tests
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/tests/run-all.sh

      - name: Audit Release Gate On Pull Request
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/check_release_gate.sh ci pull_request "${{ github.base_ref }}" "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Audit Release Gate On Mainline Push
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/check_release_gate.sh ci push "${{ github.ref_name }}" "${{ github.event.before }}" "${{ github.sha }}"
