wi_id: WI-003
goal: "展示待评估系统结果，并对具体系统任务施加编辑期单系统锁定"
scope:
  - "在详情页展示待评估系统结果"
  - "在编辑页按 target system 元数据隐藏或禁用系统级操作"
  - "在后端系统级编辑接口上阻断锁定任务的新增/重命名/删除/重新拆分"
out_of_scope:
  - "不把待评估系统展示扩展到任务列表"
  - "不移除功能点级编辑和任务级重估能力"
allowed_paths:
  - frontend/src/pages/ReportPage.js
  - frontend/src/pages/EditPage.js
  - frontend/src/__tests__/reportPage.targetSystem.test.js
  - frontend/src/__tests__/editPage.targetSystemLock.test.js
  - backend/api/routes.py
  - backend/tests/test_target_system_locking.py
  - testing.md
  - meta.yaml
forbidden_paths:
  - versions/**
  - spec.md
  - design.md
  - work-items/**
  - contracts/**
  - deployment.md

branch_execution:
  execution_group: null
  execution_branch: null
  owned_paths: []
  shared_paths: []
  shared_file_owner: parent-feature
  merge_order: 3
  conflict_policy: stop and update design before expanding shared scope

phase_scope: Implementation

input_refs:
  - docs/inputs/2026-04-19-target-system-scope.md#visibility
  - docs/inputs/2026-04-19-target-system-scope.md#edit-constraints
requirement_refs:
  - REQ-002
  - REQ-005
acceptance_refs:
  - ACC-002
  - ACC-005
