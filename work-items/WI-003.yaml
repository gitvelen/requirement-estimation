dependency_refs:
  - WI-001
  - WI-002
dependency_type: strong
contract_refs: []

evidence_refs: []

verification_profile: focused
required_verification:
  - "详情页测试覆盖具体系统与 unlimited 两种待评估系统展示"
  - "锁定测试覆盖系统级操作入口隐藏和后端接口拒绝，同时保留功能点级编辑"

stop_conditions:
  - "如果锁定策略需要禁止功能点级编辑或任务级重估"
  - "如果系统级 scope-change 操作面不止当前四类接口"
reopen_triggers:
  - "详情页展示需求扩展到任务列表或其他看板"
  - "锁定任务仍需支持改选另一个具体系统"
hard_constraints:
  - "具体系统任务的系统级新增、重命名、删除、重新拆分必须全部被阻断"
  - "功能点级增删改和随之触发的重估能力必须保留"
