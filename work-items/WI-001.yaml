wi_id: WI-001
phase_scope: Implementation

goal: "交付 vNext 附件解析与内网部署修正，使 txt 附件可解析、上传页文案收敛、HTTP 8000 安全头满足扫描、前端不启动 443、后端 compose 和 upstream 配置符合新部署口径。"
derived_from: design.md#work-item-derivation

requirement_refs:
  - REQ-001
  - REQ-002
  - REQ-003
  - REQ-004
  - REQ-005
  - REQ-006
