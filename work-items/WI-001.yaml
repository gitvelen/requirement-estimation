  - TC-ACC-001-01
  - TC-ACC-002-01
  - TC-ACC-003-01
  - TC-ACC-004-01
  - TC-ACC-005-01
  - TC-ACC-006-01

scope:
  - "为通用文档解析和嵌入附件提取新增 txt 类型支持，并保持附件失败隔离。"
  - "调整发起评估页展示文案为 .docx格式，但不收窄后端旧格式兼容。"
  - "让内网前端 HTTP 8000 返回 HSTS 和三项通用安全头。"
  - "删除前端 internal 部署链路中的 443/SSL/HTTPS 证书启动路径。"
  - "让前端 internal 部署脚本从 .env.frontend 读取 FRONTEND_BACKEND_UPSTREAM 并渲染 runtime nginx。"
  - "删除后端 internal compose 的 /etc/timezone 挂载，并保留时区配置路径。"
out_of_scope:
  - "不修改业务 API 语义、鉴权、任务状态机、报告生成或数据模型。"
  - "不新增 HTTPS 入口、证书生成、证书挂载、CA 接入或浏览器信任链治理。"
  - "不修改 release 包、本地 .env.frontend、frontend/nginx.internal.runtime.conf 或 frontend/ssl 运行时材料。"
  - "不删除或弱化后端 .doc/.xls 上传兼容能力。"

allowed_paths:
  - backend/service/document_parser.py
  - backend/utils/embedded_attachment_extractor.py
  - backend/utils/docx_parser.py
  - frontend/src/pages/UploadPage.js
  - frontend/src/__tests__/uploadPage.targetSystem.test.js
  - frontend/nginx.internal.conf
  - docker-compose.frontend.internal.yml
  - docker-compose.backend.internal.yml
  - deploy-frontend-internal.sh
  - .env.frontend.example
  - tests/test_attachment_extraction.py
  - tests/test_docx_parser.py
  - tests/test_frontend_nginx_upload_limit.py
  - tests/test_deploy_frontend_internal_script.py
  - tests/test_backend_config_env_files.py
  - testing.md
forbidden_paths:
  - versions/**
  - spec.md
  - design.md
  - work-items/**
  - contracts/**
  - deployment.md
  - release/**
  - frontend/nginx.internal.runtime.conf
  - frontend/ssl/**

dependency_refs: []
dependency_type: none
contract_refs: []

required_verification:
  - "python -m pytest tests/test_attachment_extraction.py tests/test_docx_parser.py -q"
  - "python -m pytest tests/test_frontend_nginx_upload_limit.py tests/test_deploy_frontend_internal_script.py tests/test_backend_config_env_files.py tests/test_task_upload_legacy_doc_api.py -q"
  - "cd frontend && npm test -- --watchAll=false --runTestsByPath src/__tests__/uploadPage.targetSystem.test.js"

stop_conditions:
  - "目标、边界、验收或测试用例不清楚"
  - "需要修改 forbidden_paths 或超出 allowed_paths"
  - "实现需要改变 spec.md / design.md 的产品或架构口径"
  - "需要启动前端 443 或引入 HTTPS 证书路径"
reopen_triggers:
  - "安全团队要求真实 HTTPS HSTS 语义、443 入口或 HTTP 到 HTTPS 跳转"
  - "txt 附件样本无法通过后缀或内容可靠识别，需要补充样本和策略"
  - "需要收窄 .doc/.xls 上传兼容或修改任务上传 API 语义"
