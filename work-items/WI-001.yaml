wi_id: WI-001
goal: "在不重写拆分链路的前提下，完成规则管理页说明纠偏，并让点击估算时按管理员 COSMIC 配置主动执行分析、通过统一 rule_context 接入估算主链路，保留按功能点可追溯的降级证据"
scope:
  - "重写规则管理页 COSMIC 使用说明与快速设置文案，消除对现网拆分粒度控制的误导表达"
  - "在 `/tasks/{task_id}/estimate` 链路按管理员当前 COSMIC 配置主动执行分析、构建统一 rule_context，并显式注入估算 Agent"
  - "让 COSMIC 分析器在当前估算动作内输出统一 rule_context 结构，并在功能点级失败时记录 degraded/failure_reason"
  - "扩展估算上下文 artifact 与相关测试，证明规则被应用、降级或跳过"
out_of_scope:
  - "不修改 backend/agent/feature_breakdown_agent.py 或拆分 prompt"
  - "不新增前台规则使用证据展示"
  - "不修改系统识别、报告导出或 COSMIC 配置持久化接口"

allowed_paths:
  - frontend/src/pages/CosmicConfigPage.js
  - frontend/src/__tests__/cosmicConfigPage.render.test.js
  - backend/api/routes.py
  - backend/agent/work_estimation_agent.py
  - backend/utils/cosmic_analyzer.py
  - backend/service/system_profile_service.py
  - tests/test_task_reevaluate_api.py
  - tests/test_evaluation_contract_api.py
  - backend/tests/test_target_system_orchestrator.py
  - testing.md
  - meta.yaml
forbidden_paths:
  - versions/**
  - spec.md
  - design.md
  - work-items/**
  - contracts/**
  - deployment.md
  - backend/agent/feature_breakdown_agent.py
  - backend/prompts/prompt_templates.py
  - backend/api/cosmic_routes.py
  - frontend/src/components/**

branch_execution:
  execution_group: null
  execution_branch: null
  owned_paths: []
  shared_paths: []
  shared_file_owner: parent-feature
  merge_order: single-branch-only
  conflict_policy: stop and update design before expanding shared scope

phase_scope: Implementation

input_refs:
  - docs/inputs/2026-04-22-cosmic-guidance-and-splitting-boundary.md#intent
  - docs/inputs/2026-04-22-cosmic-guidance-and-splitting-boundary.md#clarifications
requirement_refs:
  - REQ-001
  - REQ-002
  - REQ-003
  - REQ-004
acceptance_refs:
  - ACC-001
  - ACC-002
  - ACC-003
  - ACC-004
verification_refs:
  - VO-001
  - VO-002
  - VO-003
  - VO-004
derived_from: DS-001
dependency_refs: []
dependency_type: none
contract_refs: []

evidence_refs: []

verification_profile: focused
required_verification:
  - "npm test -- --runInBand frontend/src/__tests__/cosmicConfigPage.render.test.js"
  - "pytest tests/test_task_reevaluate_api.py tests/test_evaluation_contract_api.py -q"
  - "pytest backend/tests/test_target_system_orchestrator.py -q"

stop_conditions:
  - "如果实现需要修改拆分 Agent 或拆分 prompt，立即停止并回到 design 对齐"
  - "如果实现需要新增前台规则使用证据展示，立即停止并回写 spec/design"
  - "如果统一 rule_context 设计无法兼容未来其他规则，需要先回写 design"
reopen_triggers:
  - "发现 `functional_process_rules.granularity` 的字段语义必须重定义或移除"
  - "发现规则上下文必须扩展为新的外部接口契约"
  - "发现需要把 COSMIC 直接接入拆分链路而不是只接入估算链路"
hard_constraints:
  - "禁止修改已有功能点拆分主链路"
  - "COSMIC 分析必须在点击估算时执行，不能只消费历史遗留的 cosmic_analysis"
  - "规则失败处理必须按功能点降级，不得整任务静默回退"
  - "估算必须保留完整需求语义，rule_context 只能补强不能替代"
