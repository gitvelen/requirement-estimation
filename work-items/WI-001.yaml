wi_id: WI-001
goal: "在解析器内部补齐附件递归解析与正文合并，使现有任务主链路自动获得更完整的 requirement_content"
scope:
  - "新增通用附件提取器，扫描 DOCX/XLSX/PPTX 宿主中的嵌入附件并识别支持格式正文"
  - "在 DocxParser 主入口合并主文档正文与附件正文，保持现有返回字段不变"
  - "为递归深度、循环检测、大小/数量/超时保护和错误隔离补齐自动化测试"
out_of_scope:
  - "不修改 backend/agent/** 的系统识别、功能点拆分或估算逻辑"
  - "不修改 backend/api/** 的任务接口、任务存储或返回结构"
  - "不新增前端附件展示、来源标注或报告格式变更"

allowed_paths:
  - backend/utils/docx_parser.py
  - backend/service/document_parser.py
  - backend/utils/embedded_attachment_extractor.py
  - tests/test_docx_parser.py
  - tests/test_document_parser.py
  - tests/test_attachment_extraction.py
  - testing.md
  - meta.yaml
forbidden_paths:
  - versions/**
  - spec.md
  - design.md
  - work-items/**
  - contracts/**
  - deployment.md
  - backend/agent/**
  - backend/api/**
  - frontend/**

branch_execution:
  execution_group: null
  execution_branch: null
  owned_paths: []
  shared_paths: []
  shared_file_owner: parent-feature
  merge_order: single-branch-only
  conflict_policy: stop and update design before expanding shared scope

phase_scope: Implementation

input_refs:
  - docs/inputs/attachment-parsing-requirement.md
requirement_refs:
  - REQ-001
  - REQ-002
  - REQ-003
  - REQ-004
  - REQ-005
acceptance_refs:
  - ACC-001
  - ACC-002
  - ACC-003
  - ACC-004
  - ACC-005
verification_refs:
  - VO-001
  - VO-002
  - VO-003
  - VO-004
  - VO-005
derived_from: DS-001
dependency_refs: []
dependency_type: none
contract_refs: []

evidence_refs: []

verification_profile: focused
required_verification:
  - "pytest tests/test_attachment_extraction.py -q"
  - "pytest tests/test_docx_parser.py tests/test_document_parser.py -q"
  - "验证无附件文档结果不回归，且损坏附件不会中断整体解析"

stop_conditions:
  - "如果实现需要修改 backend/agent/**、backend/api/** 或 frontend/**，立即停止并回到 design 对齐"
  - "如果真实附件样例无法通过现有依赖稳定解包，需要先确认是否允许新增依赖或缩小支持边界"
  - "如果正文合并策略会改变现有无附件文档的任务结果语义，需要先回写 spec/design"
reopen_triggers:
  - "发现必须新增 API/UI 字段来表达附件来源、层级或错误详情"
  - "发现支持边界需要从 DOCX/XLSX/PPTX/PDF 缩减或扩大"
  - "发现资源保护默认值无法满足现有样例，需要调整 spec 约束"
hard_constraints:
  - "禁止修改已有 Agent 核心逻辑"
  - "递归深度默认不超过 3 层，单附件默认不超过 10MB，附件总数默认不超过 20 个"
  - "单个附件解析失败只能记录并跳过，不能中断整个主文档处理流程"
