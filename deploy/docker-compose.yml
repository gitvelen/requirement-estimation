version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: requirement-backend
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DEBUG=false
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    depends_on:
      - milvus

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: requirement-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Milvus向量数据库（可选）
  milvus:
    image: milvusdb/milvus:latest
    container_name: requirement-milvus
    ports:
      - "19530:19530"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped

volumes:
  milvus_data:
