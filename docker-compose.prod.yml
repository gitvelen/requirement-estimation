version: '3.8'

services:
  # ========== Milvus向量数据库组件 ==========
  # 生产环境完整部署，包含Milvus知识库功能

  # Etcd：Milvus的元数据存储
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - app-network
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # MinIO：Milvus的对象存储
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - app-network
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Milvus：向量数据库
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - app-network
    ports:
      - "19530:19530"  # Milvus gRPC端口
      - "9091:9091"    # Milvus metrics端口
    depends_on:
      - "etcd"
      - "minio"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      retries: 3
    restart: unless-stopped

  # ========== 主应用服务 ==========

  # 后端服务
  backend:
    build:
      context: .
      args:
        # 如果使用私服镜像，修改下面的 URL
        # 示例：http://your-private-pypi-server/simple
        - UV_INDEX_URL=https://mirrors.cloud.tencent.com/pypi/simple
    container_name: requirement-backend
    ports:
      - "443:443"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./backend/config:/app/backend/config
    environment:
      - PYTHONUNBUFFERED=1
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - KNOWLEDGE_ENABLED=true
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - "milvus"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:443/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务（使用Nginx）
  frontend:
    image: nginx:alpine
    container_name: requirement-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  etcd_data:
    driver: local
  minio_data:
    driver: local
  milvus_data:
    driver: local
